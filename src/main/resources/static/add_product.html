<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #4f46e5;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #ecfdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.5rem;
        }

        .form-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
        }

        .form-header p {
            color: #64748b;
            margin-top: 5px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            color: #334155;
            transition: all 0.2s;
            outline: none;
            background-color: #f8fafc;
        }

        .form-control:focus {
            border-color: #10b981;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #10b981;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #059669;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>

    <a href="product_manage.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Product Management
    </a>

    <div class="form-container">
        <div class="form-header">
            <div class="icon-circle">
                <i class="fa-solid fa-box-open"></i>
            </div>
            <h1>Add New Product</h1>
            <p>Enter the details of the new product to list it in the store.</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="addProductForm">
            <div class="form-group">
                <label for="name">Product Name <span style="color: #ef4444;">*</span></label>
                <input type="text" id="name" name="name" class="form-control"
                    placeholder="e.g. Wireless Headphones" required>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label for="price">Price (₹) <span style="color: #ef4444;">*</span></label>
                    <input type="number" id="price" name="price" class="form-control" placeholder="0.00"
                        step="0.01" min="0" required>
                </div>

                <div class="form-group col">
                    <label for="photoUrl">Product Image URL</label>
                    <input type="text" id="photoUrl" name="photoUrl" class="form-control"
                        placeholder="https://example.com/image.jpg">
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control"
                    placeholder="Briefly describe the product..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-plus"></i> Add Product
            </button>
        </form>
    </div>

     <script>
        document.getElementById('addProductForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.querySelector('.btn-submit');
            const alertBox = document.getElementById('alertBox');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Adding...';
            btn.disabled = true;

            const product = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value),
                photoUrl: document.getElementById('photoUrl').value
            };

            try {
                const response = await fetch('/addProduct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                
                const result = await response.text();

                if (response.ok) {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${result || 'Product added successfully!'}`;
                    alertBox.style.display = 'block';
                    document.getElementById('addProductForm').reset();
                } else {
                    throw new Error(result || 'Failed to add product');
                }
            } catch (error) {
                alertBox.className = 'alert alert-error';
                alertBox.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Error adding product: ' + error.message;
                alertBox.style.display = 'block';
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> Add Product';
                btn.disabled = false;
                setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
            }
        });
    </script>
</body>

</html>
