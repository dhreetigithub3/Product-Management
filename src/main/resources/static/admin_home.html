<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #334155;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 1.1rem;
            color: #64748b;
        }

        .options-container {
            display: flex;
            gap: 32px;
            max-width: 900px;
            padding: 0 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-card {
            background-color: #ffffff;
            width: 320px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #4f46e5;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            border-color: transparent;
        }

        .option-card:hover::before {
            opacity: 1;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: #4f46e5;
            transition: all 0.3s ease;
        }

        .option-card:hover .icon-circle {
            background-color: #4f46e5;
            color: #ffffff;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.5;
        }

        .logout-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .logout-btn:hover {
            color: #ef4444;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Welcome, Admin</h1>
        <p>What would you like to manage today?</p>
    </div>

    <div class="options-container">
        <!-- User Management Card -->
        <a href="user_manage.html" class="option-card">
            <div class="icon-circle">
                <i class="fa-solid fa-users"></i>
            </div>
            <h2 class="card-title">User Management</h2>
            <p class="card-desc">View, edit, add, or remove users and manage their roles and permissions.</p>
        </a>

        <!-- Product Management Card -->
        <a href="product_manage.html" class="option-card">
            <div class="icon-circle">
                <i class="fa-solid fa-box-open"></i>
            </div>
            <h2 class="card-title">Product Management</h2>
            <p class="card-desc">Manage your inventory, update product details, pricing, and availability.</p>
        </a>
    </div>
</body>

</html>
